name: Coverage

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "53 4 * * 1"

permissions:
  contents: read
  id-token: write

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  jest:
    name: Jest coverage
    if: ${{ vars.TEST_DISABLED != 'true' && vars.TEST_DISABLED != '1' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Jest with coverage
        run: npm run test:ci:coverage

      - name: Publish coverage summary
        if: always()
        env:
          COVERAGE_FILE: coverage/cobertura-coverage.xml
        run: |
          python3 <<'PY'
          import os
          import xml.etree.ElementTree as ET

          coverage_file = os.environ["COVERAGE_FILE"]
          summary_file = os.environ["GITHUB_STEP_SUMMARY"]

          if not os.path.exists(coverage_file):
              with open(summary_file, "a", encoding="utf-8") as summary:
                  summary.write("### Jest coverage\n\nCoverage report was not generated.\n")
              raise SystemExit(0)

          root = ET.parse(coverage_file).getroot()
          lines_valid = int(root.attrib.get("lines-valid", "0"))
          lines_covered = int(root.attrib.get("lines-covered", "0"))
          branches_valid = int(root.attrib.get("branches-valid", "0"))
          branches_covered = int(root.attrib.get("branches-covered", "0"))

          def percent(covered, total):
              if total == 0:
                  return "n/a"
              return f"{covered / total * 100:.2f}%"

          with open(summary_file, "a", encoding="utf-8") as summary:
              summary.write("### Jest coverage\n\n")
              summary.write("| Metric | Covered | Total | Coverage |\n")
              summary.write("| --- | ---: | ---: | ---: |\n")
              summary.write(f"| Lines | {lines_covered} | {lines_valid} | {percent(lines_covered, lines_valid)} |\n")
              summary.write(f"| Branches | {branches_covered} | {branches_valid} | {percent(branches_covered, branches_valid)} |\n\n")
          PY

      - name: Upload coverage to Codecov
        continue-on-error: true
        uses: codecov/codecov-action@v6
        with:
          use_oidc: true
          files: coverage/cobertura-coverage.xml
          disable_search: true
          flags: browser-extension-unit
          name: passly-browser-extension-jest
          fail_ci_if_error: false
          verbose: true

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-browser-extension
          path: coverage/
          if-no-files-found: ignore
